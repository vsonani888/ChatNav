<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Claude Prompt Injector</title>
  <style>
    body {
      width: 300px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #fff;
      color: #111;
      padding: 16px;
      margin: 0;
    }

    h1 {
      font-size: 14px;
      margin: 0 0 4px;
    }

    p.sub {
      color: #666;
      margin: 0 0 14px;
      font-size: 11px;
    }

    .prompt-box {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      font-size: 11px;
      font-family: monospace;
      color: #444;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }

    label { margin: 0; }
  </style>
</head>
<body>

  <h1>Claude Prompt Injector</h1>
  <p class="sub">Prepended to every message on claude.ai</p>

  <div class="prompt-box" id="promptDisplay"></div>

  <div class="toggle-wrap">
    <input type="checkbox" id="enabledToggle" />
    <label for="enabledToggle">Enabled</label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
