<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ChatNav</title>
  <style>
    body {
      width: 220px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #fff;
      color: #111;
      padding: 16px;
      margin: 0;
    }

    h1 {
      font-size: 14px;
      margin: 0 0 12px;
    }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }

    label { margin: 0; }
  </style>
</head>
<body>

  <h1>ChatNav</h1>

  <div class="toggle-wrap">
    <input type="checkbox" id="enabledToggle" />
    <label for="enabledToggle">Enabled</label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
